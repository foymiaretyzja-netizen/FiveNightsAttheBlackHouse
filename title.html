<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Title Screen - Five Nights at the Black House</title>
    <style>
        /* CSS Reset & Basic Setup */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; 
            user-select: none; 
        }

        /* --- NEW: Start Screen --- */
        #start-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100; /* Ensure it sits on top of all UI and effects */
            cursor: pointer;
            transition: opacity 1s ease-in-out;
        }

        #start-text {
            font-size: 1.5rem;
            color: #aaa;
            animation: slowPulse 2s infinite;
            user-select: none;
        }

        @keyframes slowPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* 1. The Background Image with Jitter and Flicker */
        #bg-container {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: url('StoryScenes/JiuN7.jpg'); 
            background-size: cover;
            background-position: center;
            opacity: 0; 
            animation: fadeIn 3s forwards, glitchFlicker 5s infinite, jitter 8s infinite;
            z-index: 1;
        }

        /* 2. True Animated TV Static (Fuzz) */
        #static-noise {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            /* Uses a generated SVG noise texture */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.15; /* Adjust this to make the snow lighter or darker */
            pointer-events: none; 
            z-index: 10;
            animation: fuzzShift 0.2s infinite linear;
        }

        /* 3. CRT Scanlines (Tight horizontal stripes) */
        #scanlines {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(
                to bottom,
                rgba(255,255,255,0),
                rgba(255,255,255,0) 50%,
                rgba(0,0,0,0.2) 50%,
                rgba(0,0,0,0.2)
            );
            background-size: 100% 4px; /* Size of the scanlines */
            pointer-events: none;
            z-index: 11;
        }

        /* 4. Rolling Tracking Line */
        #tracking-line {
            position: absolute;
            top: -10%; left: 0; width: 100vw; height: 20px;
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
            pointer-events: none;
            z-index: 12;
            animation: rollDown 6s linear infinite;
        }

        /* --- Animations --- */
        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes glitchFlicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.6; }
            22% { opacity: 0.2; }
            80% { opacity: 0.8; }
            81% { opacity: 0.3; }
            82% { opacity: 1; }
        }

        @keyframes jitter {
            0%, 96% { transform: translate(0, 0); }
            97% { transform: translate(-2px, 1px); }
            98% { transform: translate(2px, -2px); }
            99% { transform: translate(-1px, 2px); }
            100% { transform: translate(0, 0); }
        }

        /* Rapidly shifts the background position of the noise to animate it */
        @keyframes fuzzShift {
            0% { background-position: 0 0; }
            100% { background-position: 100% 100%; }
        }

        /* Moves the thick tracking line down the screen */
        @keyframes rollDown {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        /* --- UI Elements --- */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 20;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start; 
        }

        h1 {
            font-size: 3.5rem;
            line-height: 1.2;
            text-shadow: 3px 3px 6px #000, 0 0 15px rgba(255, 255, 255, 0.3);
            margin-bottom: 60px;
            max-width: 600px;
        }

        .menu-btn {
            display: block;
            background: transparent;
            color: #fff;
            border: none;
            font-size: 2rem;
            font-family: inherit;
            margin-bottom: 25px;
            cursor: pointer;
            transition: color 0.2s, text-shadow 0.2s, padding-left 0.2s;
            text-shadow: 2px 2px 4px #000;
        }

        .menu-btn:hover {
            color: #ccc;
            text-shadow: 0 0 15px #fff;
            padding-left: 10px; 
        }

        #credits-display {
            margin-top: auto; 
            font-size: 1.2rem;
            color: #aaa;
            opacity: 0; 
            transition: opacity 0.5s ease-in-out;
            text-shadow: 1px 1px 2px #000;
        }
    </style>
</head>
<body>

    <audio id="bg-music" src="Sounds/universfield-horror-background-atmosphere-156462.mp3" loop></audio>

    <div id="start-screen">
        <div id="start-text">[Click anywhere to start]</div>
    </div>

    <div id="bg-container"></div>
    <div id="static-noise"></div>
    <div id="scanlines"></div>
    <div id="tracking-line"></div>

    <div id="ui-layer">
        <h1>Five Nights<br>at the Black House</h1>
        
        <button class="menu-btn" onclick="startGame()">Play</button>
        <button class="menu-btn" onclick="comingSoon()">Save Data</button>
        <button class="menu-btn" onclick="comingSoon()">Import Data</button>
        <button class="menu-btn" onclick="toggleCredits()">Credits</button>

        <div id="credits-display">
            Directed by Solan; made by Gemini and grok.
        </div>
    </div>

    <script>
        // --- NEW: Start Screen & Audio Logic ---
        document.getElementById('start-screen').addEventListener('click', function() {
            // Play Audio
            const bgMusic = document.getElementById('bg-music');
            bgMusic.play().catch(e => console.log("Audio play failed:", e));

            // Fade out and remove the start screen overlay
            this.style.opacity = '0';
            setTimeout(() => this.remove(), 1000);
        }, { once: true }); // Triggers only on the very first click

        // --- Original Menu Logic ---
        function startGame() {
            // Routing updated to point to the 'nights' folder
            window.location.href = 'nights/night1intro.html'; 
        }

        function comingSoon() {
            alert("Data management logic will be implemented here later.");
        }

        function toggleCredits() {
            const credits = document.getElementById('credits-display');
            if (credits.style.opacity === '1') {
                credits.style.opacity = '0';
            } else {
                credits.style.opacity = '1';
            }
        }
    </script>
</body>
</html>
