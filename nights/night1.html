<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night 1 - Five Nights at the Black House</title>
    <style>
        /* CSS Reset & Setup */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; 
            user-select: none; 
        }

        /* --- 1. The Panning Office Background --- */
        #office-panorama {
            position: absolute;
            top: 0; left: 0;
            width: 150vw; /* 50% wider than the screen to allow panning */
            height: 100vh;
            background-image: url('../Scenes/Presidential-room.jpg');
            background-size: cover;
            background-position: center;
            z-index: 1;
            /* The transition adds a slight, cinematic delay to the camera movement */
            transition: transform 0.1s ease-out; 
        }

        /* --- 2. Task Panels (Moves with the room) --- */
        .task-panel {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 350px;
            height: 250px;
            background: rgba(10, 10, 10, 0.85);
            border: 2px solid #333;
            box-shadow: 0 0 20px #000;
            padding: 20px;
            border-radius: 10px;
            z-index: 5;
        }

        #left-panel { left: 10vw; }
        #right-panel { right: 10vw; }

        /* --- 3. Invisible Door Hitboxes (Stays fixed to screen edges) --- */
        .door-zone {
            position: absolute;
            top: 0;
            width: 12vw; /* Clickable area is 12% of the screen edge */
            height: 100vh;
            z-index: 20;
            cursor: pointer;
        }

        #left-door-zone { left: 0; }
        #right-door-zone { right: 0; }

        /* Subtle darkening effect when closed */
        .door-shadow {
            position: absolute;
            top: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.9), transparent);
            opacity: 0;
            transition: opacity 0.2s ease-in-out;
            pointer-events: none;
        }
        #right-door-zone .door-shadow {
            background: linear-gradient(to left, rgba(0,0,0,0.9), transparent);
        }

    </style>
</head>
<body>

    <div id="office-panorama">
        
        <div id="left-panel" class="task-panel">
            <h2 style="color: #ff4444; margin-bottom: 10px;">Deporter-3000</h2>
            <p style="color: #aaa;">[System Offline]</p>
            <p style="font-size: 0.8rem; margin-top: 10px;">Waiting for connection to ../night1-sys/tasks.js...</p>
        </div>

        <div id="right-panel" class="task-panel">
            <h2 style="color: #ff4444; margin-bottom: 10px;">Missile Launcher 900</h2>
            <p style="color: #aaa;">[System Offline]</p>
            <p style="font-size: 0.8rem; margin-top: 10px;">Waiting for connection to ../night1-sys/tasks.js...</p>
        </div>

    </div>

    <div id="left-door-zone" class="door-zone" onclick="toggleDoor('left')">
        <div id="left-shadow" class="door-shadow"></div>
    </div>
    
    <div id="right-door-zone" class="door-zone" onclick="toggleDoor('right')">
        <div id="right-shadow" class="door-shadow"></div>
    </div>

    <script>
        // --- Panning Logic ---
        const panorama = document.getElementById('office-panorama');
        const maxPan = window.innerWidth * 0.5; // We have 50vw of extra image to pan across

        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX;
            const screenWidth = window.innerWidth;
            
            // Find out what percentage of the screen the mouse is at (0 to 1)
            const percentage = mouseX / screenWidth;
            
            // Move the background the opposite direction of the mouse
            const panAmount = -(percentage * maxPan);
            panorama.style.transform = `translateX(${panAmount}px)`;
        });

        // --- Door Audio & State Logic ---
        // (We will eventually move the logic part to power_doors.js, but keeping it here for visual testing)
        
        const openSounds = [
            new Audio('../Sounds/dragon-studio-open-door-stock-sfx-454246.mp3'),
            new Audio('../Sounds/soundreality-opening-door-411632.mp3')
        ];
        
        const closeSounds = [
            new Audio('../Sounds/dragon-studio-door-close-effect-382710.mp3'),
            new Audio('../Sounds/freesound_community-door-close-79921.mp3')
        ];

        let leftDoorClosed = false;
        let rightDoorClosed = false;

        function playRandomSound(soundArray) {
            const randomIndex = Math.floor(Math.random() * soundArray.length);
            const sound = soundArray[randomIndex];
            sound.currentTime = 0; // Resets audio so it can play rapidly if spammed
            sound.play().catch(e => console.log("Audio block: Click the screen first!", e));
        }

        // Global function so other scripts can eventually see it
        window.toggleDoor = function(side) {
            if (side === 'left') {
                leftDoorClosed = !leftDoorClosed;
                playRandomSound(leftDoorClosed ? closeSounds : openSounds);
                document.getElementById('left-shadow').style.opacity = leftDoorClosed ? '1' : '0';
            } else if (side === 'right') {
                rightDoorClosed = !rightDoorClosed;
                playRandomSound(rightDoorClosed ? closeSounds : openSounds);
                document.getElementById('right-shadow').style.opacity = rightDoorClosed ? '1' : '0';
            }
        };
    </script>
</body>
</html>
