<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night 1 - Five Nights at the Black House</title>
    <style>
        /* CSS Reset & Setup */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; 
            user-select: none; 
        }

        /* --- 1. The Panning Office Background --- */
        #office-panorama {
            position: absolute;
            top: 0; left: 0;
            width: 150vw; 
            height: 100vh;
            background-image: url('../Scenes/Presidential-room.jpg');
            background-size: cover;
            background-position: center;
            z-index: 1;
            transition: transform 0.1s ease-out; 
        }

        /* --- 2. Hover Task Tabs --- */
        .task-panel {
            position: absolute;
            bottom: 0;
            width: 350px;
            height: 300px;
            background: rgba(10, 10, 10, 0.95);
            border: 2px solid #444;
            border-bottom: none;
            border-radius: 15px 15px 0 0;
            padding: 20px;
            z-index: 30; 
            transform: translateY(150%); 
            transition: transform 0.3s ease 0s; 
        }

        .tab-label {
            text-align: center;
            font-size: 1.2rem;
            color: #ccc;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 20px;
            pointer-events: none;
        }

        #left-panel { left: 8vw; }
        #right-panel { right: 8vw; }

        .task-panel.is-visible { transform: translateY(85%); }
        .task-panel.is-visible:hover {
            transform: translateY(0);
            transition: transform 0.3s ease 0.5s; 
        }

        /* --- NEW: Motion Sensor Tab (Top Middle) --- */
        #motion-panel {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%) translateY(-85%);
            width: 300px;
            height: 140px;
            background: rgba(5, 20, 5, 0.95);
            border: 2px solid #00ff00;
            border-top: none;
            border-radius: 0 0 15px 15px;
            padding: 15px;
            z-index: 70;
            transition: transform 0.3s;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2);
        }
        #motion-panel:hover { transform: translateX(-50%) translateY(0); }
        
        .sensor-btn {
            background: #004400;
            color: #00ff00;
            border: 1px solid #00ff00;
            padding: 5px 10px;
            margin: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }
        .sensor-btn:disabled { opacity: 0.3; cursor: default; }
        #sensor-display { margin-top: 10px; color: #00ff00; font-size: 1.1rem; }

        /* --- 3. Invisible Door Hitboxes --- */
        .door-zone {
            position: absolute;
            top: 0;
            width: 15vw; 
            height: 100vh;
            z-index: 20;
            cursor: pointer;
        }
        #left-door-zone { left: 0; }
        #right-door-zone { right: 0; }

        /* --- 4. Dynamic Door Shadows --- */
        .door-shadow {
            position: absolute;
            top: 0; 
            width: 25vw; 
            height: 100vh;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }
        #left-shadow { left: 0; background: linear-gradient(to right, rgba(0,0,0,0.95) 10%, transparent); }
        #right-shadow { right: 0; background: linear-gradient(to left, rgba(0,0,0,0.95) 10%, transparent); }

        /* --- 5. Camera Button & Monitor --- */
        #camera-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            cursor: pointer;
            z-index: 60; 
            transition: background 0.2s, border 0.2s;
        }
        #camera-btn::after {
            content: "v"; display: block; text-align: center; font-size: 1.5rem;
            color: #aaa; line-height: 40px; font-family: sans-serif; transform: scaleY(0.5); 
        }

        #camera-monitor {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #111; 
            z-index: 50;
            transform: translateY(100%); 
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); 
            display: flex; justify-content: center; align-items: center;
        }

        /* Camera Feed Styles */
        #camera-layout { display: flex; width: 100%; height: 100%; background: #050505; padding: 40px; gap: 30px; }
        #camera-nav { flex: 0 0 280px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }
        #camera-screen { flex: 1; position: relative; border: 4px solid #333; background: #000; overflow: hidden; border-radius: 10px; }
        #camera-feed { width: 100%; height: 100%; background-size: cover; background-position: center; }
        #static-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; opacity: 0; pointer-events: none; z-index: 20; }
        
        .ai-sprite { position: absolute; z-index: 5; display: none; }
        #camera-screen .ai-sprite { bottom: 50px; height: 60%; }
        #charrlie-sprite-office, #elong-sprite-office { height: 70%; bottom: 10%; z-index: 100; }

        .is-switching { animation: flashEffect 0.3s ease-out; }
        @keyframes flashEffect {
            0% { opacity: 0.9; background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAIAAAACCAYAAABytg0kAAAAFElEQVQIW2NkYGD4z8DAwMgAI0AMCKcCBXY/C6MAAAAASUVORK5CYII=') repeat; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="office-panorama"></div>

    <div id="motion-panel">
        <div style="font-size: 0.7rem; color: #00ff00; letter-spacing: 1px;">MOTION DETECTOR v1.0</div>
        <div id="sensor-ui">
            <p style="font-size: 0.8rem; margin: 5px 0;">Check which door?</p>
            <button class="sensor-btn" onclick="runMotionScan('left')">LEFT</button>
            <button class="sensor-btn" onclick="runMotionScan('right')">RIGHT</button>
        </div>
        <div id="sensor-display">READY</div>
    </div>

    <div id="left-panel" class="task-panel">
        <div class="tab-label">DEP-3000</div>
        <h2 style="color: #ff4444; margin-bottom: 10px;">Deportations</h2>
        <div id="dep-content"><p id="dep-status">[System Offline]</p></div>
    </div>

    <div id="right-panel" class="task-panel">
        <div class="tab-label">ML-900</div>
        <h2 style="color: #ff4444; margin-bottom: 10px;">Missile Strike</h2>
        <div id="ml-content"><p id="ml-status">[System Offline]</p></div>
    </div>

    <div id="left-shadow" class="door-shadow"></div>
    <div id="right-shadow" class="door-shadow"></div>
    <div id="left-door-zone" class="door-zone" onclick="toggleDoor('left')"></div>
    <div id="right-door-zone" class="door-zone" onclick="toggleDoor('right')"></div>

    <div id="camera-btn" onclick="toggleCamera()"></div>

    <div id="camera-monitor">
        <div id="camera-layout">
            <div id="camera-nav">
                <img id="camera-map-img" src="../night1-sys/sprites/Screenshot 2026-04-10 11.54.10 PM.png" alt="Office Map">
            </div>
            <div id="camera-screen">
                <div id="camera-feed"></div>
                <img id="charrlie-sprite" class="ai-sprite" src="../night1-sys/sprites/Charrlie.png">
                <img id="elong-sprite" class="ai-sprite" src="../night1-sys/sprites/Elong.png">
                <div id="static-flash"></div>
            </div>
        </div>
    </div>

    <img id="charrlie-sprite-office" class="ai-sprite" src="../night1-sys/sprites/Charrlie.png">
    <img id="elong-sprite-office" class="ai-sprite" src="../night1-sys/sprites/Elong.png">

    <script>
        const panorama = document.getElementById('office-panorama');
        const leftShadow = document.getElementById('left-shadow');
        const rightShadow = document.getElementById('right-shadow');
        const leftPanel = document.getElementById('left-panel');
        const rightPanel = document.getElementById('right-panel');
        
        const maxPan = window.innerWidth * 0.5; 
        
        window.leftDoorClosed = false;
        window.rightDoorClosed = false;
        window.isCameraOpen = false;
        window.aiPositions = { charrlie: 'Guest Room', elong: 'Storage' };

        document.addEventListener('mousemove', (e) => {
            if (window.isCameraOpen) return; 
            const mouseX = e.clientX;
            const percentage = mouseX / window.innerWidth; 
            panorama.style.transform = `translateX(${(percentage * -maxPan)}px)`;

            if (percentage < 0.35) leftPanel.classList.add('is-visible');
            else leftPanel.classList.remove('is-visible');

            if (percentage > 0.65) rightPanel.classList.add('is-visible');
            else rightPanel.classList.remove('is-visible');

            if (window.leftDoorClosed) leftShadow.style.opacity = Math.max(0, 1 - (percentage / 0.3)); 
            if (window.rightDoorClosed) rightShadow.style.opacity = Math.max(0, (percentage - 0.7) / 0.3);
        });

        // Motion Sensor Logic
        function runMotionScan(door) {
            const display = document.getElementById('sensor-display');
            const buttons = document.querySelectorAll('.sensor-btn');
            
            buttons.forEach(b => b.disabled = true);
            display.innerText = "LOADING...";
            display.style.color = "#ffff00";

            setTimeout(() => {
                let found = false;
                // Target rooms for the doors
                const targetRoom = (door === 'left') ? 'Presidential Left Door' : 'Presidential Right Door';
                
                if (window.aiPositions.elong === targetRoom || window.aiPositions.charrlie === targetRoom) {
                    found = true;
                }

                display.innerText = found ? "PRESENT" : "ABSENT";
                display.style.color = found ? "#ff0000" : "#00ff00";

                // Auto-reset after 3 seconds
                setTimeout(() => {
                    display.innerText = "READY";
                    display.style.color = "#00ff00";
                    buttons.forEach(b => b.disabled = false);
                }, 3000);
            }, 5000); // 5s Loading time
        }

        window.toggleDoor = function(side) {
            if (window.isCameraOpen) return; 
            if (side === 'left') {
                window.leftDoorClosed = !window.leftDoorClosed;
                if (!window.leftDoorClosed) leftShadow.style.opacity = 0;
            } else {
                window.rightDoorClosed = !window.rightDoorClosed;
                if (!window.rightDoorClosed) rightShadow.style.opacity = 0;
            }
        };
    </script>

    <script src="../night1-sys/cameras.js"></script>
    <script src="../night1-sys/ElongAI.js"></script>
</body>
</html>
