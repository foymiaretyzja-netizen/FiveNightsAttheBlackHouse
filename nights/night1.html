<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night 1 - Five Nights at the Black House</title>
    <style>
        /* CSS Reset & Setup */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden; 
            user-select: none; 
        }

        /* --- 1. The Panning Office Background --- */
        #office-panorama {
            position: absolute;
            top: 0; left: 0;
            width: 150vw; 
            height: 100vh;
            background-image: url('../Scenes/Presidential-room.jpg');
            background-size: cover;
            background-position: center;
            z-index: 1;
            transition: transform 0.1s ease-out; 
        }

        /* --- 2. Hover Task Tabs --- */
        .task-panel {
            position: absolute;
            bottom: 0;
            width: 350px;
            height: 300px;
            background: rgba(10, 10, 10, 0.95);
            border: 2px solid #444;
            border-bottom: none;
            border-radius: 15px 15px 0 0;
            padding: 20px;
            z-index: 30; 
            transform: translateY(150%); 
            transition: transform 0.3s ease 0s; 
        }

        .tab-label {
            text-align: center;
            font-size: 1.2rem;
            color: #ccc;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 20px;
            pointer-events: none;
        }

        #left-panel { left: 8vw; }
        #right-panel { right: 8vw; }

        .task-panel.is-visible { transform: translateY(85%); }
        .task-panel.is-visible:hover {
            transform: translateY(0);
            transition: transform 0.3s ease 0.5s; 
        }

        /* --- 3. Invisible Door Hitboxes --- */
        .door-zone {
            position: absolute;
            top: 0;
            width: 15vw; 
            height: 100vh;
            z-index: 20;
            cursor: pointer;
        }

        #left-door-zone { left: 0; }
        #right-door-zone { right: 0; }

        /* --- 4. Dynamic Door Shadows --- */
        .door-shadow {
            position: absolute;
            top: 0; 
            width: 25vw; 
            height: 100vh;
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        #left-shadow {
            left: 0;
            background: linear-gradient(to right, rgba(0,0,0,0.95) 10%, transparent);
        }

        #right-shadow {
            right: 0;
            background: linear-gradient(to left, rgba(0,0,0,0.95) 10%, transparent);
        }

        /* --- 5. NEW: Camera Button & Monitor Overlay --- */
        #camera-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            cursor: pointer;
            z-index: 60; /* Keeps it above everything, even the open monitor */
            transition: background 0.2s, border 0.2s;
        }

        #camera-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border: 2px solid #fff;
        }

        #camera-btn::after {
            content: "v";
            display: block;
            text-align: center;
            font-size: 1.5rem;
            color: #aaa;
            line-height: 40px;
            font-family: sans-serif;
            transform: scaleY(0.5); /* Flattens the 'v' to look like a double arrow or grip */
        }

        #camera-monitor {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #111; /* Dark gray placeholder for now */
            z-index: 50;
            transform: translateY(100%); /* Hides it completely off the bottom of the screen */
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); /* Snappy FNAF-style slide */
            display: flex;
            justify-content: center;
            align-items: center;
        }

    </style>
</head>
<body>

    <div id="office-panorama"></div>

    <div id="left-panel" class="task-panel">
        <div class="tab-label">DEP-3000</div>
        <h2 style="color: #ff4444; margin-bottom: 10px;">Deportations</h2>
        <p style="color: #aaa;">[System Offline]</p>
    </div>

    <div id="right-panel" class="task-panel">
        <div class="tab-label">ML-900</div>
        <h2 style="color: #ff4444; margin-bottom: 10px;">Missile Strike</h2>
        <p style="color: #aaa;">[System Offline]</p>
    </div>

    <div id="left-shadow" class="door-shadow"></div>
    <div id="right-shadow" class="door-shadow"></div>
    <div id="left-door-zone" class="door-zone" onclick="toggleDoor('left')"></div>
    <div id="right-door-zone" class="door-zone" onclick="toggleDoor('right')"></div>

    <div id="camera-btn" onclick="toggleCamera()"></div>

    <div id="camera-monitor">
        <h1 style="color: #444; text-shadow: 0 0 10px #000;">[CAMERA SYSTEM OFFLINE]</h1>
    </div>

    <script>
        // --- Core Variables ---
        const panorama = document.getElementById('office-panorama');
        const leftShadow = document.getElementById('left-shadow');
        const rightShadow = document.getElementById('right-shadow');
        const leftPanel = document.getElementById('left-panel');
        const rightPanel = document.getElementById('right-panel');
        const cameraMonitor = document.getElementById('camera-monitor');
        
        const maxPan = window.innerWidth * 0.5; 
        let leftDoorClosed = false;
        let rightDoorClosed = false;
        let isCameraOpen = false; // Tracks monitor state

        // --- Panning & Dynamic Shadow/UI Logic ---
        document.addEventListener('mousemove', (e) => {
            if (isCameraOpen) return; // Stop panning while looking at the cameras

            const mouseX = e.clientX;
            const screenWidth = window.innerWidth;
            const percentage = mouseX / screenWidth; 
            
            const panAmount = -(percentage * maxPan);
            panorama.style.transform = `translateX(${panAmount}px)`;

            // Tab Visibility Logic 
            if (percentage < 0.35) {
                leftPanel.classList.add('is-visible');
            } else {
                leftPanel.classList.remove('is-visible');
            }

            if (percentage > 0.65) {
                rightPanel.classList.add('is-visible');
            } else {
                rightPanel.classList.remove('is-visible');
            }

            // Shadow Logic
            if (leftDoorClosed) {
                leftShadow.style.opacity = Math.max(0, 1 - (percentage / 0.3)); 
            }
            if (rightDoorClosed) {
                rightShadow.style.opacity = Math.max(0, (percentage - 0.7) / 0.3);
            }
        });

        // --- Door Logic ---
        const openSounds = [
            new Audio('../Sounds/dragon-studio-open-door-stock-sfx-454246.mp3'),
            new Audio('../Sounds/soundreality-opening-door-411632.mp3')
        ];
        
        const closeSounds = [
            new Audio('../Sounds/dragon-studio-door-close-effect-382710.mp3'),
            new Audio('../Sounds/freesound_community-door-close-79921.mp3')
        ];

        function playRandomSound(soundArray) {
            const randomIndex = Math.floor(Math.random() * soundArray.length);
            const sound = soundArray[randomIndex];
            sound.currentTime = 0; 
            sound.play().catch(e => console.log("Audio block:", e));
        }

        window.toggleDoor = function(side) {
            if (isCameraOpen) return; // Can't touch doors while on cameras

            if (side === 'left') {
                leftDoorClosed = !leftDoorClosed;
                playRandomSound(leftDoorClosed ? closeSounds : openSounds);
                if (!leftDoorClosed) leftShadow.style.opacity = 0;
            } else if (side === 'right') {
                rightDoorClosed = !rightDoorClosed;
                playRandomSound(rightDoorClosed ? closeSounds : openSounds);
                if (!rightDoorClosed) rightShadow.style.opacity = 0;
            }
        };

        // --- NEW: Camera Toggle Logic ---
        window.toggleCamera = function() {
            isCameraOpen = !isCameraOpen;
            if (isCameraOpen) {
                cameraMonitor.style.transform = 'translateY(0)'; // Slide up
                // Hide side panels instantly if they were peeking
                leftPanel.classList.remove('is-visible');
                rightPanel.classList.remove('is-visible');
            } else {
                cameraMonitor.style.transform = 'translateY(100%)'; // Slide down
            }
        };
    </script>
</body>
</html>
