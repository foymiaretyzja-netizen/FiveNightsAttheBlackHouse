<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night 3 - Intro</title>
    <style>
        /* Basic Setup for a cinematic black screen */
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
            user-select: none;
        }

        /* The interactive click screen (Copied from Night 2) */
        #start-screen {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            cursor: pointer;
            font-size: 1.5rem;
            color: #aaa;
            animation: slowPulse 2s infinite;
            transition: opacity 1s ease-in-out;
        }

        @keyframes slowPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Text Containers */
        .text-container {
            position: absolute;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }

        /* The warning text */
        #warning-text {
            font-size: 1.5rem;
            max-width: 80%;
            line-height: 1.5;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        /* The aggressive pop for the Night 3 title */
        #night-text {
            font-size: 5rem;
            font-weight: bold;
            letter-spacing: 10px;
            transition: opacity 0.2s ease-in; /* Faster fade in for impact */
        }
    </style>
</head>
<body>

    <audio id="bg-music" src="Sounds/dragon-studio-horror-background-music-443137.mp3"></audio>
    <audio id="boom-sound" src="Sounds/11325622-big-cine-boom-sound-effect-245851.mp3"></audio>

    <div id="start-screen">[Click to continue to Night 3]</div>
    
    <div id="warning-text" class="text-container">
        "You cannot hide from him, if you see him, just know he can't see in the dark."
    </div>

    <div id="night-text" class="text-container">
        NIGHT 3
    </div>

    <script>
        const startScreen = document.getElementById('start-screen');
        const warningText = document.getElementById('warning-text');
        const nightText = document.getElementById('night-text');
        
        const bgMusic = document.getElementById('bg-music');
        const boomSound = document.getElementById('boom-sound');

        // --- Trigger Sequence on Click ---
        startScreen.addEventListener('click', function() {
            
            // 1. Play the ambient background music immediately
            bgMusic.volume = 0.6;
            bgMusic.play().catch(e => console.log("Audio play failed:", e));

            // 2. Fade out the start screen
            this.style.opacity = '0';
            
            // Wait 1 second for the start screen to fade out, then begin sequence
            setTimeout(() => {
                this.remove(); // Get it out of the way

                // 3. Fade in Warning Text
                setTimeout(() => {
                    warningText.style.opacity = '1';
                }, 500); 

                // 4. Fade out Warning Text
                setTimeout(() => {
                    warningText.style.opacity = '0';
                }, 7500); 

                // 5. BOOM! Fade in "NIGHT 3"
                setTimeout(() => {
                    nightText.style.opacity = '1';
                    boomSound.play().catch(e => console.log("Boom play failed:", e));
                }, 10500); 

                // 6. Fade out "NIGHT 3" slowly
                setTimeout(() => {
                    nightText.style.transition = 'opacity 3s ease-out';
                    nightText.style.opacity = '0';
                    
                    // Fade out background music audio
                    let fadeAudio = setInterval(() => {
                        if (bgMusic.volume > 0.1) {
                            bgMusic.volume -= 0.1;
                        } else {
                            bgMusic.pause();
                            clearInterval(fadeAudio);
                        }
                    }, 200);
                }, 14500); 

                // 7. Redirect to Night 3
                setTimeout(() => {
                    window.location.href = 'night3.html';
                }, 18500); 

            }, 1000); // 1 second delay matches the CSS transition time
            
        }, { once: true }); // Ensures this only fires the very first time they click
    </script>

</body>
</html>
