<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night 4 - The Treasury</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* --- Cinematic Fade In --- */
        #night-fade-in {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: #000;
            z-index: 9999;
            pointer-events: none;
            animation: slowFadeIn 3s ease-in forwards;
        }

        @keyframes slowFadeIn {
            0% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        /* --- Panning Room Container --- */
        #panorama-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 150vw; 
            height: 100vh;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); 
        }

        .room-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* --- Vent View (Static) --- */
        #vent-view {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            z-index: 5;
            display: none;
        }

        .interactive {
            pointer-events: auto;
            z-index: 10;
        }

        /* --- Invisible Door Hitbox --- */
        #door-hitbox {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 25%;
            height: 60%;
            cursor: pointer;
            z-index: 10;
        }

        /* --- Vent Buttons (Smaller, Red, Boxy) --- */
        .vent-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(80, 0, 0, 0.8);
            border: 2px solid #ff3333;       
            color: #fff;
            padding: 15px 5px;               
            font-size: 1rem;                 
            font-weight: bold;
            cursor: pointer;
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 3px;
            z-index: 10;
            border-radius: 0;                
            transition: background 0.2s;
        }

        .vent-btn:hover { background: rgba(130, 0, 0, 0.9); }
        .vent-btn.left { left: 5vw; }
        .vent-btn.right { right: 5vw; }

        /* --- Hover Task Tabs (Boxy) --- */
        .task-panel {
            position: absolute;
            bottom: 0;
            width: 320px;
            height: 280px;
            background: rgba(10, 10, 10, 0.95);
            border: 2px solid #444;
            border-bottom: none;
            border-radius: 0; 
            padding: 20px;
            z-index: 30; 
            transform: translateY(150%); 
            transition: transform 0.3s ease 0s; 
        }

        #left-panel { left: 8vw; }
        #right-panel { right: 8vw; }

        .task-panel.is-visible { transform: translateY(85%); }
        .task-panel.is-visible:hover {
            transform: translateY(0);
            transition: transform 0.3s ease 0.2s; 
        }

        .tab-label {
            text-align: center;
            font-size: 1.1rem;
            color: #ccc;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 15px;
            pointer-events: none;
        }

        /* --- System Buttons --- */
        .sys-btn {
            background: #222;
            color: #ccc;
            border: 2px solid #555;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            text-align: center;
            border-radius: 0; 
        }
        .sys-btn:hover {
            background: #444;
            color: #fff;
            border-color: #fff;
        }

        /* --- Return Button --- */
        #btn-return {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            font-size: 1.5rem;
            background: #880000;
            color: #fff;
            border: 2px solid #fff;
            cursor: pointer;
            z-index: 20;
            display: none;
            border-radius: 0; 
        }

        #btn-return:hover { background: #ff0000; }

        /* --- Fade Overlay --- */
        #fade-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-in-out;
        }
    </style>
</head>
<body>

    <div id="night-fade-in"></div>

    <div id="game-container">
        <div id="panorama-container">
            <img id="office-view" class="room-img" src="../night4-sys/office/officepowered-opened.jpg" alt="Office">
            
            <div id="door-hitbox" class="interactive"></div>
            <div id="btn-vent-left" class="vent-btn left interactive">VENTS</div>
            <div id="btn-vent-right" class="vent-btn right interactive">VENTS</div>
        </div>
        
        <img id="vent-view" src="" alt="Vent">

        <div id="left-panel" class="task-panel interactive">
            <div class="tab-label">MAINTENANCE</div>
            <h2 style="color: #ffaa00; margin-bottom: 15px; font-size: 1.2rem;">System Repairs</h2>
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <button class="sys-btn">Repair Lights (0/5)</button>
                <button class="sys-btn">Fix Breaker (0/1)</button>
            </div>
        </div>

        <div id="right-panel" class="task-panel interactive">
            <div class="tab-label">SYS-PWR</div>
            <h2 style="color: #00ff00; margin-bottom: 10px; font-size: 1.2rem;">Power Controls</h2>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button class="sys-btn" style="border-color: #ffbb00; color: #ffbb00;">Generator</button>
                <button class="sys-btn">Motion Sensor</button>
            </div>
        </div>

        <button id="btn-return" class="interactive">RETURN TO OFFICE</button>

        <div id="fade-overlay"></div>
    </div>

    <script>
        // --- State Variables ---
        let isDoorClosed = false;
        let isLookingInVent = false;

        // --- DOM Elements ---
        const panoramaContainer = document.getElementById('panorama-container');
        const officeView = document.getElementById('office-view');
        const ventView = document.getElementById('vent-view');
        
        const doorHitbox = document.getElementById('door-hitbox');
        const btnVentLeft = document.getElementById('btn-vent-left');
        const btnVentRight = document.getElementById('btn-vent-right');
        const btnReturn = document.getElementById('btn-return');
        const fadeOverlay = document.getElementById('fade-overlay');

        const leftPanel = document.getElementById('left-panel');
        const rightPanel = document.getElementById('right-panel');

        // --- Audio Setup ---
        const openSounds = [
            new Audio('../Sounds/dragon-studio-open-door-stock-sfx-454246.mp3'),
            new Audio('../Sounds/soundreality-opening-door-411632.mp3')
        ];
        const closeSounds = [
            new Audio('../Sounds/dragon-studio-door-close-effect-382710.mp3'),
            new Audio('../Sounds/freesound_community-door-close-79921.mp3')
        ];

        function playRandomSound(soundArray) {
            const sound = soundArray[Math.floor(Math.random() * soundArray.length)];
            sound.currentTime = 0; 
            sound.play().catch(e => console.log("Audio block:", e));
        }

        // --- 0. Panning Logic ---
        const maxPan = window.innerWidth * 0.5; 
        
        document.addEventListener('mousemove', (e) => {
            if (isLookingInVent) return; 

            const percentage = e.clientX / window.innerWidth;
            
            // Handle Camera Pan
            const panAmount = -(percentage * maxPan);
            panoramaContainer.style.transform = `translateX(${panAmount}px)`;

            // Handle UI Panel Triggers
            if (percentage < 0.3) {
                leftPanel.classList.add('is-visible');
            } else {
                leftPanel.classList.remove('is-visible');
            }

            if (percentage > 0.7) {
                rightPanel.classList.add('is-visible');
            } else {
                rightPanel.classList.remove('is-visible');
            }
        });

        // --- 1. Invisible Door Toggle & Audio ---
        doorHitbox.addEventListener('click', () => {
            isDoorClosed = !isDoorClosed;
            
            if (isDoorClosed) {
                officeView.src = "../night4-sys/office/officepowered-closed.jpg";
                playRandomSound(closeSounds);
            } else {
                officeView.src = "../night4-sys/office/officepowered-opened.jpg";
                playRandomSound(openSounds);
            }
        });

        // --- 2. Vent Navigation Logic ---
        function transitionToVent(side) {
            if (isLookingInVent) return;
            isLookingInVent = true;
            fadeOverlay.style.opacity = '1'; 

            setTimeout(() => {
                panoramaContainer.style.display = 'none'; 
                leftPanel.style.display = 'none';
                rightPanel.style.display = 'none';

                if (side === 'left') {
                    ventView.src = "../night4-sys/office/left-vent.jpg";
                } else {
                    ventView.src = "../night4-sys/office/right-vent.jpg";
                }
                
                ventView.style.display = 'block';
                btnReturn.style.display = 'block';

                fadeOverlay.style.opacity = '0';
            }, 300);
        }

        function returnToOffice() {
            fadeOverlay.style.opacity = '1'; 

            setTimeout(() => {
                ventView.style.display = 'none';
                btnReturn.style.display = 'none';

                panoramaContainer.style.display = 'block'; 
                leftPanel.style.display = 'block';
                rightPanel.style.display = 'block';
                
                isLookingInVent = false;

                fadeOverlay.style.opacity = '0';
            }, 300);
        }

        // --- Event Listeners ---
        btnVentLeft.addEventListener('click', () => transitionToVent('left'));
        btnVentRight.addEventListener('click', () => transitionToVent('right'));
        btnReturn.addEventListener('click', returnToOffice);

    </script>
</body>
</html>
