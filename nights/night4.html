<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night 4 - The Treasury</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; /* No scrolling */
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* --- Environment Images --- */
        .room-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* The powered room sits on top of the dark room */
        #office-powered {
            z-index: 2;
            transition: opacity 0.5s linear; /* Smooth fade as power drains */
        }

        #vent-view {
            z-index: 3;
            display: none; /* Hidden until a vent is clicked */
        }

        /* --- UI Overlay --- */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Lets clicks pass through to underneath elements if needed */
        }

        /* Make interactive UI elements clickable */
        .interactive {
            pointer-events: auto;
        }

        /* --- Vent Buttons (Vertical Text) --- */
        .vent-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(50, 50, 50, 0.8);
            border: 2px solid #aaa;
            padding: 20px 10px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 5px;
            transition: background 0.2s, transform 0.2s;
        }

        .vent-btn:hover {
            background: rgba(100, 100, 100, 0.9);
        }

        .vent-btn.left {
            left: 20px;
        }

        .vent-btn.right {
            right: 20px;
        }

        /* --- Center Door Button --- */
        #btn-door {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #222;
            color: #fff;
            border: 2px solid #555;
            cursor: pointer;
            border-radius: 5px;
        }

        #btn-door:hover { background: #444; }

        /* --- Generator UI --- */
        #generator-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        #power-bar {
            width: 300px;
            height: 20px;
            background: #111;
            border: 2px solid #fff;
            margin-bottom: 10px;
            position: relative;
        }

        #power-fill {
            width: 100%;
            height: 100%;
            background: #00ff00;
            transition: width 0.2s linear, background 0.2s linear;
        }

        #btn-crank {
            padding: 10px 20px;
            font-size: 1.2rem;
            background: #aa8800;
            color: #fff;
            border: 2px solid #fff;
            cursor: pointer;
            font-weight: bold;
        }

        #btn-crank:active { background: #ffcc00; }

        /* --- Back Button (Inside Vent) --- */
        #btn-return {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            font-size: 1.5rem;
            background: #880000;
            color: #fff;
            border: 2px solid #fff;
            cursor: pointer;
            display: none;
        }

        #btn-return:hover { background: #ff0000; }

        /* --- Blackout Fade Screen --- */
        #fade-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-in-out;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <img id="office-dark" class="room-img" src="./night4-sys/office/officedark-opened.jpg" alt="Dark Office">
        <img id="office-powered" class="room-img" src="./night4-sys/office/officepowered-opened.jpg" alt="Powered Office">
        
        <img id="vent-view" class="room-img" src="./night4-sys/office/left-vent.jpg" alt="Vent View">

        <div id="ui-layer">
            <div id="btn-vent-left" class="vent-btn left interactive">VENTS</div>
            <div id="btn-vent-right" class="vent-btn right interactive">VENTS</div>

            <button id="btn-door" class="interactive">CLOSE VAULT DOOR</button>

            <div id="generator-container" class="interactive">
                <div id="power-bar"><div id="power-fill"></div></div>
                <button id="btn-crank">CRANK GENERATOR</button>
            </div>

            <button id="btn-return" class="interactive">RETURN TO OFFICE</button>
        </div>

        <div id="fade-overlay"></div>
    </div>

    <script>
        // --- State Variables ---
        let powerLevel = 100;
        let isDoorClosed = false;
        let isLookingInVent = false;

        // --- DOM Elements ---
        const darkOffice = document.getElementById('office-dark');
        const poweredOffice = document.getElementById('office-powered');
        const ventView = document.getElementById('vent-view');
        
        const btnDoor = document.getElementById('btn-door');
        const btnCrank = document.getElementById('btn-crank');
        const powerFill = document.getElementById('power-fill');
        const fadeOverlay = document.getElementById('fade-overlay');
        
        const btnVentLeft = document.getElementById('btn-vent-left');
        const btnVentRight = document.getElementById('btn-vent-right');
        const btnReturn = document.getElementById('btn-return');
        const generatorUI = document.getElementById('generator-container');

        // --- 1. Generator & Opacity Logic ---
        function updatePower() {
            if (isLookingInVent) return; // Optional: Pause drain while in vent

            powerLevel -= 0.15; // Drain speed
            if (powerLevel < 0) powerLevel = 0;

            // Update UI Bar
            powerFill.style.width = `${powerLevel}%`;
            if (powerLevel < 30) {
                powerFill.style.background = "#ff0000";
            } else if (powerLevel < 60) {
                powerFill.style.background = "#ffaa00";
            } else {
                powerFill.style.background = "#00ff00";
            }

            // --- THE OPACITY TRICK ---
            // Fades the powered room out to reveal the dark room beneath it
            poweredOffice.style.opacity = powerLevel / 100;

            requestAnimationFrame(updatePower);
        }
        requestAnimationFrame(updatePower);

        // Crank Button Action
        btnCrank.addEventListener('click', () => {
            powerLevel += 15;
            if (powerLevel > 100) powerLevel = 100;
        });

        // --- 2. Front Door Logic ---
        btnDoor.addEventListener('click', () => {
            isDoorClosed = !isDoorClosed;
            
            if (isDoorClosed) {
                btnDoor.innerText = "OPEN VAULT DOOR";
                // Added ./ to paths
                darkOffice.src = "./night4-sys/office/officedark-closed.jpg";
                poweredOffice.src = "./night4-sys/office/officepowered-closed.jpg";
            } else {
                btnDoor.innerText = "CLOSE VAULT DOOR";
                // Added ./ to paths
                darkOffice.src = "./night4-sys/office/officedark-opened.jpg";
                poweredOffice.src = "./night4-sys/office/officepowered-opened.jpg";
            }
        });

        // --- 3. Vent Navigation Logic ---
        function transitionToVent(side) {
            isLookingInVent = true;
            fadeOverlay.style.opacity = '1'; // Fade to black

            setTimeout(() => {
                // Hide Office Elements
                darkOffice.style.display = 'none';
                poweredOffice.style.display = 'none';
                btnVentLeft.style.display = 'none';
                btnVentRight.style.display = 'none';
                btnDoor.style.display = 'none';
                generatorUI.style.display = 'none';

                // Show Vent Elements
                // Added ./ to paths
                ventView.src = side === 'left' ? './night4-sys/office/left-vent.jpg' : './night4-sys/office/left-vent.jpg'; 
                ventView.style.display = 'block';
                btnReturn.style.display = 'block';

                // Fade back in
                fadeOverlay.style.opacity = '0';
            }, 300); // Wait for CSS transition to finish
        }

        function returnToOffice() {
            fadeOverlay.style.opacity = '1';

            setTimeout(() => {
                // Hide Vent Elements
                ventView.style.display = 'none';
                btnReturn.style.display = 'none';

                // Restore Office Elements
                darkOffice.style.display = 'block';
                poweredOffice.style.display = 'block';
                btnVentLeft.style.display = 'block';
                btnVentRight.style.display = 'block';
                btnDoor.style.display = 'block';
                generatorUI.style.display = 'block';

                isLookingInVent = false;
                requestAnimationFrame(updatePower); // Resume drain if paused

                fadeOverlay.style.opacity = '0';
            }, 300);
        }

        btnVentLeft.addEventListener('click', () => transitionToVent('left'));
        btnVentRight.addEventListener('click', () => transitionToVent('right'));
        btnReturn.addEventListener('click', returnToOffice);

    </script>
</body>
</html>
