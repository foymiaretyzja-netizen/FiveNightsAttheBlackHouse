<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night 4 - The Treasury</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; /* No scrolling */
            user-select: none; /* Prevents ugly blue text highlighting when spam clicking */
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* --- Environment Images --- */
        .room-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* The powered room sits on top of the dark room */
        #office-powered {
            z-index: 2;
            transition: opacity 0.5s linear; /* Smooth fade as power drains */
        }

        #vent-view {
            z-index: 3;
            display: none; /* Hidden until a vent is clicked */
        }

        /* --- UI Overlay --- */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Lets clicks pass through to underneath elements if needed */
        }

        /* Make interactive UI elements clickable */
        .interactive {
            pointer-events: auto;
        }

        /* --- Vent Buttons (Vertical Text) --- */
        .vent-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(50, 50, 50, 0.8);
            border: 2px solid #aaa;
            padding: 20px 10px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 5px;
            transition: background 0.2s, transform 0.2s;
        }

        .vent-btn:hover {
            background: rgba(100, 100, 100, 0.9);
        }

        .vent-btn.left {
            left: 20px;
        }

        .vent-btn.right {
            right: 20px;
        }

        /* --- Center Door Button --- */
        #btn-door {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #222;
            color: #fff;
            border: 2px solid #555;
            cursor: pointer;
            border-radius: 5px;
        }

        #btn-door:hover { background: #444; }

        /* --- Generator UI --- */
        #generator-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        #power-bar {
            width: 300px;
            height: 20px;
            background: #111;
            border: 2px solid #fff;
            margin-bottom: 10px;
            position: relative;
        }

        #power-fill {
            width: 100%;
            height: 100%;
            background: #00ff00;
            /* Removed width transition here so the JS loop doesn't stutter */
            transition: background 0.2s linear; 
        }

        #btn-crank {
            padding: 10px 20px;
            font-size: 1.2rem;
            background: #aa8800;
            color: #fff;
            border: 2px solid #fff;
            cursor: pointer;
            font-weight: bold;
        }

        #btn-crank:active { background: #ffcc00; }
