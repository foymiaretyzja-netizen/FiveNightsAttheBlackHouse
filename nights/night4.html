<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night 4 - The Treasury</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* --- Panning Room Container --- */
        #panorama-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 150vw; /* 50% wider than the screen so it can pan */
            height: 100vh;
            transition: transform 0.1s ease-out; /* Smooth follow delay */
        }

        .room-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* --- Vent View (Static, doesn't pan) --- */
        #vent-view {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 5;
            display: none;
        }

        /* --- Interactive Elements inside Panorama --- */
        .interactive {
            pointer-events: auto;
            z-index: 10;
        }

        #door-hitbox {
            position: absolute;
            top: 20%;
            left: 50%; /* Center of the 150vw panorama */
            transform: translateX(-50%);
            width: 25%;
            height: 60%;
            cursor: pointer;
            z-index: 10;
            /* border: 2px solid red; */ /* Uncomment to test hitbox placement */
        }

        .vent-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(50, 50, 50, 0.8);
            border: 2px solid #aaa;
            padding: 20px 10px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 5px;
            z-index: 10;
        }

        .vent-btn:hover { background: rgba(100, 100, 100, 0.9); }
        .vent-btn.left { left: 5vw; }
        .vent-btn.right { right: 5vw; }

        /* --- Static UI Elements (Return Button) --- */
        #btn-return {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            font-size: 1.5rem;
            background: #880000;
            color: #fff;
            border: 2px solid #fff;
            cursor: pointer;
            z-index: 20;
            display: none;
        }

        #btn-return:hover { background: #ff0000; }

        /* --- Fade Overlay --- */
        #fade-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-in-out;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="panorama-container">
            <img id="office-view" class="room-img" src="../night4-sys/office/officepowered-opened.jpg" alt="Office">
            
            <div id="door-hitbox" class="interactive"></div>
            <div id="btn-vent-left" class="vent-btn left interactive">VENTS</div>
            <div id="btn-vent-right" class="vent-btn right interactive">VENTS</div>
        </div>
        
        <img id="vent-view" src="" alt="Vent">

        <button id="btn-return" class="interactive">RETURN TO OFFICE</button>

        <div id="fade-overlay"></div>
    </div>

    <script>
        // --- State Variables ---
        let isDoorClosed = false;
        let isLookingInVent = false;

        // --- DOM Elements ---
        const panoramaContainer = document.getElementById('panorama-container');
        const officeView = document.getElementById('office-view');
        const ventView = document.getElementById('vent-view');
        
        const doorHitbox = document.getElementById('door-hitbox');
        const btnVentLeft = document.getElementById('btn-vent-left');
        const btnVentRight = document.getElementById('btn-vent-right');
        const btnReturn = document.getElementById('btn-return');
        const fadeOverlay = document.getElementById('fade-overlay');

        // --- 0. Panning Logic ---
        const maxPan = window.innerWidth * 0.5; // 150vw container - 100vw screen = 50vw of extra panning room
        
        document.addEventListener('mousemove', (e) => {
            // Stop panning if we are looking inside a vent
            if (isLookingInVent) return; 

            const percentage = e.clientX / window.innerWidth;
            const panAmount = -(percentage * maxPan);
            panoramaContainer.style.transform = `translateX(${panAmount}px)`;
        });

        // --- 1. Invisible Door Toggle ---
        doorHitbox.addEventListener('click', () => {
            isDoorClosed = !isDoorClosed;
            
            if (isDoorClosed) {
                officeView.src = "../night4-sys/office/officepowered-closed.jpg";
            } else {
                officeView.src = "../night4-sys/office/officepowered-opened.jpg";
            }
        });

        // --- 2. Vent Navigation Logic ---
        function transitionToVent(side) {
            if (isLookingInVent) return;
            isLookingInVent = true;
            fadeOverlay.style.opacity = '1'; 

            setTimeout(() => {
                // Hide the entire panning room
                panoramaContainer.style.display = 'none'; 

                // Dynamically load left or right vent image
                if (side === 'left') {
                    ventView.src = "../night4-sys/office/left-vent.jpg";
                } else {
                    ventView.src = "../night4-sys/office/right-vent.jpg";
                }
                
                ventView.style.display = 'block';
                btnReturn.style.display = 'block';

                fadeOverlay.style.opacity = '0';
            }, 300);
        }

        function returnToOffice() {
            fadeOverlay.style.opacity = '1'; 

            setTimeout(() => {
                // Hide Vent Elements
                ventView.style.display = 'none';
                btnReturn.style.display = 'none';

                // Restore Panning Room
                panoramaContainer.style.display = 'block'; 
                isLookingInVent = false;

                fadeOverlay.style.opacity = '0';
            }, 300);
        }

        // --- Event Listeners ---
        btnVentLeft.addEventListener('click', () => transitionToVent('left'));
        btnVentRight.addEventListener('click', () => transitionToVent('right'));
        btnReturn.addEventListener('click', returnToOffice);

    </script>
</body>
</html>
