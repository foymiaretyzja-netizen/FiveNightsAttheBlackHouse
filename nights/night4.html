<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night 4 - The Treasury</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* --- Environment Images --- */
        .room-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        #vent-view {
            display: none; /* Hidden by default */
        }

        /* --- UI Overlay --- */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Allows clicks to pass through except on interactive elements */
        }

        .interactive {
            pointer-events: auto;
        }

        /* --- Invisible Door Hitbox --- */
        #door-hitbox {
            position: absolute;
            top: 20%;      
            left: 35%;     
            width: 30%;    
            height: 60%;   
            cursor: pointer;
            /* border: 2px solid red; */ /* Uncomment to see the hitbox */
        }

        /* --- Vent Buttons --- */
        .vent-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(50, 50, 50, 0.8);
            border: 2px solid #aaa;
            padding: 20px 10px;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 5px;
        }

        .vent-btn:hover {
            background: rgba(100, 100, 100, 0.9);
        }

        .vent-btn.left { left: 20px; }
        .vent-btn.right { right: 20px; }

        /* --- Return Button --- */
        #btn-return {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 15px 40px;
            font-size: 1.5rem;
            background: #880000;
            color: #fff;
            border: 2px solid #fff;
            cursor: pointer;
            display: none; 
        }

        #btn-return:hover { background: #ff0000; }

        /* --- Blackout Fade Screen --- */
        #fade-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease-in-out;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <img id="office-view" class="room-img" src="../night4-sys/office/officepowered-opened.jpg" alt="Office">
        
        <img id="vent-view" class="room-img" src="../night4-sys/office/left-vent.jpg" alt="Vent">

        <div id="ui-layer">
            <div id="door-hitbox" class="interactive"></div>

            <div id="btn-vent-left" class="vent-btn left interactive">VENTS</div>
            <div id="btn-vent-right" class="vent-btn right interactive">VENTS</div>

            <button id="btn-return" class="interactive">RETURN TO OFFICE</button>
        </div>

        <div id="fade-overlay"></div>
    </div>

    <script>
        // --- State Variables ---
        let isDoorClosed = false;

        // --- DOM Elements ---
        const officeView = document.getElementById('office-view');
        const ventView = document.getElementById('vent-view');
        
        const doorHitbox = document.getElementById('door-hitbox');
        const btnVentLeft = document.getElementById('btn-vent-left');
        const btnVentRight = document.getElementById('btn-vent-right');
        const btnReturn = document.getElementById('btn-return');
        const fadeOverlay = document.getElementById('fade-overlay');

        // --- 1. Invisible Door Toggle ---
        doorHitbox.addEventListener('click', () => {
            isDoorClosed = !isDoorClosed;
            
            if (isDoorClosed) {
                officeView.src = "../night4-sys/office/officepowered-closed.jpg";
            } else {
                officeView.src = "../night4-sys/office/officepowered-opened.jpg";
            }
        });

        // --- 2. Vent Navigation Logic ---
        function transitionToVent(side) {
            fadeOverlay.style.opacity = '1'; 

            setTimeout(() => {
                officeView.style.display = 'none';
                doorHitbox.style.display = 'none';
                btnVentLeft.style.display = 'none';
                btnVentRight.style.display = 'none';

                // Notice the ../ path here too!
                ventView.src = "../night4-sys/office/left-vent.jpg"; 
                ventView.style.display = 'block';
                btnReturn.style.display = 'block';

                fadeOverlay.style.opacity = '0';
            }, 300);
        }

        function returnToOffice() {
            fadeOverlay.style.opacity = '1'; 

            setTimeout(() => {
                ventView.style.display = 'none';
                btnReturn.style.display = 'none';

                officeView.style.display = 'block';
                doorHitbox.style.display = 'block';
                btnVentLeft.style.display = 'block';
                btnVentRight.style.display = 'block';

                fadeOverlay.style.opacity = '0';
            }, 300);
        }

        btnVentLeft.addEventListener('click', () => transitionToVent('left'));
        btnVentRight.addEventListener('click', () => transitionToVent('right'));
        btnReturn.addEventListener('click', returnToOffice);

    </script>
</body>
</html>
