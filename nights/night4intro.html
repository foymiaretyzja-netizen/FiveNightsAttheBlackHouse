<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Night 4 - Override</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }
        
        #intro-text {
            font-size: 2rem;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            max-width: 80%;
            line-height: 1.5;
        }
        
        #start-btn {
            padding: 15px 30px;
            font-size: 1.5rem;
            background: transparent;
            color: #aaa;
            border: 2px solid #555;
            cursor: pointer;
            font-family: 'Courier New', Courier, monospace;
            transition: 0.3s;
            position: absolute;
            z-index: 10;
        }
        
        #start-btn:hover {
            border-color: #fff;
            color: #fff;
            background: #111;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }
        
        .night-title {
            font-size: 6rem !important;
            font-weight: bold;
            color: #ffffff; /* Pure white for Night 4 */
            letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.6); /* White glow */
        }
    </style>
</head>
<body>

    <button id="start-btn">[Click here to advance to Night4]</button>
    <div id="intro-text"></div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const introText = document.getElementById('intro-text');
        
        // --- Night 4 Cinematic Audio Setup ---
        const suspenseTrack = new Audio('../Sounds/diff_style-lo-fi-suspense-374722.mp3');
        const riserTrack = new Audio('../Sounds/dragon-studio-cinematic-riser-01-414574.mp3');
        const boomTrack = new Audio('../Sounds/dragon-studio-cinematic-boom-335489.mp3');

        // Sequence updated with your precise audio triggers
        const sequence = [
            { text: "Something got in.", duration: 3500 },
            { text: "3 things got in.", duration: 3500 },
            { text: "2 left, but 3 came.", duration: 4000 }, 
            { text: "Darkness fuels him, make sure to keep the lights on.", duration: 4500, playSuspense: true }, // Suspense starts here!
            { text: "It is here as well, he will blind you from your tools, you must be wary.", duration: 5000 },
            { text: "You can't hide from him, you must use your tools precisely.", duration: 5000 },
            { text: "NIGHT 4", isTitle: true } // Handled separately for exact sync
        ];

        startBtn.addEventListener('click', () => {
            startBtn.style.opacity = '0';
            setTimeout(() => {
                startBtn.style.display = 'none';
                runIntroSequence(0);
            }, 500); 
        });

        function runIntroSequence(index) {
            const step = sequence[index];

            // 1. Trigger Suspense Music
            if (step.playSuspense) {
                suspenseTrack.currentTime = 0;
                suspenseTrack.volume = 1;
                suspenseTrack.play().catch(e => console.warn("[Audio] Blocked by browser:", e));
            }

            // 2. SPECIAL LOGIC FOR THE FINAL TITLE REVEAL
            if (step.isTitle) {
                // Fade out the suspense track
                let fadeInterval = setInterval(() => {
                    if (suspenseTrack.volume > 0.05) {
                        suspenseTrack.volume -= 0.05;
                    } else {
                        suspenseTrack.pause();
                        clearInterval(fadeInterval);
                    }
                }, 100);

                // Start the Riser in the dark
                riserTrack.currentTime = 0;
                riserTrack.play().catch(e => console.warn("[Audio] Blocked by browser:", e));

                // Wait EXACTLY 2.6 seconds (2600ms) for the sync
                setTimeout(() => {
                    // Play Boom!
                    boomTrack.currentTime = 0;
                    boomTrack.play().catch(e => console.warn("[Audio] Blocked by browser:", e));

                    // REMOVE the fade transition for a hard pop
                    introText.style.transition = 'none';

                    // Show "NIGHT 4" exactly as the Boom hits
                    introText.innerText = step.text;
                    introText.classList.add('night-title');
                    introText.style.opacity = '1';

                    // Wait 5 seconds on the title screen, then load Night 4
                    setTimeout(() => {
                        introText.style.opacity = '0'; // This will also hard cut to black, adding to the intimidation
                        setTimeout(() => {
                            window.location.href = 'night4.html';
                        }, 500); // Shorter wait since it doesn't need to fade
                    }, 5000);

                }, 2600); 

                return; // Stop the rest of the function so the title logic runs uninterrupted
            }

            // 3. STANDARD TEXT LOGIC (For lines 1 through 6)
            introText.classList.remove('night-title');
            introText.innerText = step.text;
            introText.style.opacity = '1';

            // Calculate when to start fading out (1.5 seconds before the duration ends)
            const fadeOutTime = step.duration - 1500;

            setTimeout(() => {
                introText.style.opacity = '0'; // Start fading out
                
                // Wait 1.5 seconds for the fade out to completely finish, then load the next line
                setTimeout(() => {
                    runIntroSequence(index + 1);
                }, 1500); 

            }, fadeOutTime);
        }
    </script>
</body>
</html>
