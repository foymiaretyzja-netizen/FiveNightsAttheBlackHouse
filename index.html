<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Story Intro - Five Nights at the Black House</title>
    <style>
        /* CSS Reset & Basic Setup */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #000; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; }

        /* Fullscreen Image Container */
        #intro-container { position: relative; width: 100vw; height: 100vh; }

        /* Image Layers for Crossfading */
        .bg-image {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 3s ease-in-out;
            transform: scale(1);
            animation: slowZoom 20s linear infinite alternate;
        }

        .bg-image.active { opacity: 0.6; }

        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* Center Transparent Text Box */
        #text-box {
            position: absolute;
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            text-align: center;
            background: transparent; 
            padding: 20px;
        }

        #story-text {
            font-size: 1.6rem;
            line-height: 1.6;
            text-shadow: 2px 2px 4px #000, 0 0 15px #000, 0 0 25px #000;
        }

        /* Blinking Cursor for Typewriter */
        .cursor { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* --- Skip Indicator Styles --- */
        #skip-indicator {
            position: absolute;
            bottom: 30px;
            right: 40px;
            font-size: 1.2rem;
            color: #fff;
            opacity: 0; /* Starts hidden */
            cursor: pointer;
            user-select: none; /* Prevents text highlighting when holding */
            animation: introduceSkip 5s ease-in-out 2s forwards; /* 5s animation, 2s delay */
            transition: text-shadow 1.5s linear, color 1.5s linear; /* Smooth hold effect */
        }

        /* 3 slow blinks, then settles at 30% opacity */
        @keyframes introduceSkip {
            0% { opacity: 0; }
            15% { opacity: 0.8; }
            30% { opacity: 0; }
            45% { opacity: 0.8; }
            60% { opacity: 0; }
            75% { opacity: 0.8; }
            100% { opacity: 0.3; } 
        }

        /* Class added via JS when the player is holding the button */
        #skip-indicator.holding {
            opacity: 1 !important; /* Overrides the faded state */
            color: #fff;
            text-shadow: 0 0 15px #fff, 0 0 30px #fff; /* Glows while holding */
        }
    </style>
</head>
<body>

    <audio id="bg-music" src="Sounds/universfield-horror-background-atmosphere-06-199279.mp3" loop autoplay></audio>

    <div id="intro-container">
        <div id="layer1" class="bg-image active"></div>
        <div id="layer2" class="bg-image"></div>
        
        <div id="text-box">
            <p id="story-text"><span id="typewriter"></span><span class="cursor">|</span></p>
        </div>

        <div id="skip-indicator">Hold to Skip</div>
    </div>

    <script>
        // --- 0. Audio Playback Logic ---
        // Browsers block autoplay until the user interacts with the page.
        // This ensures the audio starts the moment they click anywhere (like trying to skip).
        document.body.addEventListener("click", () => {
            const bgMusic = document.getElementById("bg-music");
            if (bgMusic.paused) {
                bgMusic.play().catch(e => console.log("Audio play failed:", e));
            }
        }, { once: true });

        // --- 1. Image Fading Logic ---
        const images = [
            'StoryScenes/Tehran.jpg', 
            'StoryScenes/SE3EN.jpg',  
            'StoryScenes/uNk5K.jpg'   
        ];
        
        let currentImageIndex = 0;
        const layer1 = document.getElementById('layer1');
        const layer2 = document.getElementById('layer2');
        let activeLayer = 1;

        layer1.style.backgroundImage = `url('${images[0]}')`;

        function changeImage() {
            currentImageIndex = (currentImageIndex + 1) % images.length;
            const nextImage = `url('${images[currentImageIndex]}')`;

            if (activeLayer === 1) {
                layer2.style.backgroundImage = nextImage;
                layer2.classList.add('active');
                layer1.classList.remove('active');
                activeLayer = 2;
            } else {
                layer1.style.backgroundImage = nextImage;
                layer1.classList.add('active');
                layer2.classList.remove('active');
                activeLayer = 1;
            }
        }
        setInterval(changeImage, 6000); 

        // --- 2. Segmented Typewriter Logic ---
        const storyParts = [
            "The Oval Office of the Black House is a suffocating tomb, lit only by a sputtering fluorescent bulb that casts long, jittery shadows.",
            "Spread across the mahogany desk are the crushing burdens of a besieged presidency: a stack of urgent deportation orders and a tactical terminal demanding missile strikes against Irun.",
            "But the true nightmare prowls just outside the thick oak doors. The Liberalist Virus of 2022 has mutated Elong Must and Charrlie Hirk from trusted allies into corrupted, cybernetic husks.",
            "Now, they drag themselves through the velvet-lined corridors of the West Wing, hunting for the last uninfected mind to consume."
        ];

        const typewriterElement = document.getElementById('typewriter');
        let currentPart = 0;
        let charIndex = 0;

        function typeWriter() {
            if (currentPart < storyParts.length) {
                let currentText = storyParts[currentPart];
                
                if (charIndex < currentText.length) {
                    typewriterElement.innerHTML += currentText.charAt(charIndex);
                    charIndex++;
                    setTimeout(typeWriter, Math.random() * 30 + 20); 
                } else {
                    setTimeout(() => {
                        typewriterElement.innerHTML = '';
                        charIndex = 0;
                        currentPart++;
                        typeWriter();
                    }, 3000); 
                }
            } else {
                setTimeout(() => {
                    window.location.href = 'title.html';
                }, 1000);
            }
        }
        setTimeout(typeWriter, 1000);

        // --- 3. Hold-to-Skip Logic ---
        const skipBtn = document.getElementById('skip-indicator');
        let skipTimer;
        const holdTimeToSkip = 1500; // 1.5 seconds

        function startSkip(e) {
            e.preventDefault(); // Prevents weird mobile behaviors
            skipBtn.classList.add('holding');
            
            // Start the timer to redirect
            skipTimer = setTimeout(() => {
                window.location.href = 'title.html';
            }, holdTimeToSkip);
        }

        function cancelSkip() {
            skipBtn.classList.remove('holding');
            // If they let go early, cancel the redirect timer
            clearTimeout(skipTimer);
        }

        // Mouse Events (Desktop)
        skipBtn.addEventListener('mousedown', startSkip);
        window.addEventListener('mouseup', cancelSkip); 
        
        // Touch Events (Mobile support)
        skipBtn.addEventListener('touchstart', startSkip);
        window.addEventListener('touchend', cancelSkip);
    </script>

</body>
</html>
